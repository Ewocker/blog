          - link "hero 我的第一份實習過去式 3 episodes 一切的都是從「我究竟要怎麼做才能留下來」這句話開始的，自從來到美國大學的第一天後我腦中就時常浮現出這樣的念頭。曾聽過很多留美成功的例子的我，親身來到這裡後才發現那只不過是被大眾媒體美化過的少數幾個而已。雖然也想過自己成為功成名就的那其中一個，但其實內心只是期望能夠在畢業後能有一個好的開始，得到一個留下來工作的機會。沒想到不久之前還是個小屁孩高中生的我不知不覺的也迎來了要面對社會的這一天。 →" [ref=e64] [cursor=pointer]:
            - /url: /blog/proofpoint-internship
