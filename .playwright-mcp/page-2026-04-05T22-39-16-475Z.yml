          - link "hero Container Technology 3 episodes 近幾年，矽谷的各個科技大廠都快速的融入 Cloud Native 原生雲 的概念。就連新興 Startups 創業 公司的軟體開發也都是直接基於 Cloud Native 概念開始的。這代表著現代的工程師想要具有競爭力，無論工作是 Frontend、Backend、又或是 Operations，對 Cloud 雲端 相關內容有著基本的了解都會是大大的加分。而在 Cloud Native 的世界中，Container 容器 則扮演著至關重要的基本角色。 →" [ref=e71] [cursor=pointer]:
